spring.application.name=filerenamer

# --- Datasource (valores por defecto para ejecución con docker-compose) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/filerenamer}
spring.datasource.username=${DB_USERNAME:filerenamer}
spring.datasource.password=${DB_PASSWORD:filerenamer}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway gestiona el esquema y la semilla ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- Almacenamiento S3 (LocalStack en local) ---
app.s3.bucket=${S3_BUCKET:incoming-files}
app.s3.endpoint=${S3_ENDPOINT:http://localhost:4566}
app.s3.region=${AWS_REGION:us-east-1}
app.s3.access-key=${AWS_ACCESS_KEY_ID:test}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:test}
app.s3.path-style-access=true

# --- Cola SQS para procesamiento asíncrono (LocalStack en local) ---
app.sqs.queue-name=${SQS_QUEUE:process-jobs}
app.sqs.endpoint=${SQS_ENDPOINT:http://localhost:4566}
app.sqs.region=${AWS_REGION:us-east-1}
app.sqs.access-key=${AWS_ACCESS_KEY_ID:test}
app.sqs.secret-key=${AWS_SECRET_ACCESS_KEY:test}
app.sqs.poll-delay-ms=2000
app.sqs.wait-time-seconds=1

# --- Actuator ---
management.endpoints.web.exposure.include=health,info

# --- Codificación UTF-8 explícita en las respuestas HTTP ---
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
